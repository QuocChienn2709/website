<!-- ==================== public/admin.html (Trang quản trị) ==================== -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Quản lý Shop Pro</title>
  <style>
    body { font-family: Arial; margin: 20px; background: #f0f0f0; }
    .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #333; color: white; }
    .section { margin-bottom: 40px; }
    button { padding: 5px 10px; cursor: pointer; }
    input, select { padding: 5px; margin: 5px; }
  </style>
</head>
<body>
<div class="container">
  <h1>👑 Admin Dashboard - Quản lý Shop</h1>

  <div class="section">
    <h2>📦 Đơn hàng</h2>
    <button onclick="loadOrders()">Tải lại</button>
    <table id="ordersTable">
      <tr><th>Mã đơn</th><th>Người dùng</th><th>Sản phẩm</th><th>Số tiền</th><th>Loại</th><th>Trạng thái</th><th>Ngày tạo</th><th>Thao tác</th></tr>
    </table>
  </div>

  <div class="section">
    <h2>🛍️ Quản lý sản phẩm</h2>
    <h3>Thêm sản phẩm mới</h3>
    <input type="text" id="prodName" placeholder="Tên sản phẩm" />
    <input type="number" id="prodPrice" placeholder="Giá" />
    <input type="text" id="prodAccount" placeholder="Tài khoản (user:pass)" style="width: 200px;" />
    <button onclick="addProduct()">Thêm sản phẩm</button>
    <table id="productsTable">
      <tr><th>ID</th><th>Tên</th><th>Giá</th><th>Tài khoản</th><th>Thao tác</th></tr>
    </table>
  </div>

  <div class="section">
    <h2>👤 Quản lý người dùng</h2>
    <table id="usersTable">
      <tr><th>ID</th><th>Username</th><th>Số dư</th><th>Cộng tiền</th></tr>
    </table>
  </div>
</div>

<script>
  async function loadOrders() {
    const res = await fetch('/api/admin/orders');
    const orders = await res.json();
    let html = '<tr><th>Mã đơn</th><th>Người dùng</th><th>Sản phẩm</th><th>Số tiền</th><th>Loại</th><th>Trạng thái</th><th>Ngày tạo</th><th>Thao tác</th></tr>';
    orders.forEach(o => {
      html += `<tr>
        <td>${o.orderCode}</td>
        <td>${o.userId?.username || 'N/A'}</td>
        <td>${o.productId?.name || (o.type === 'deposit' ? 'Nạp tiền' : 'N/A')}</td>
        <td>${o.amount.toLocaleString()}đ</td>
        <td>${o.type === 'purchase' ? 'Mua hàng' : 'Nạp tiền'}</td>
        <td style="color:${o.status === 'completed' ? 'green' : 'orange'}">${o.status}</td>
        <td>${new Date(o.createdAt).toLocaleString()}</td>
        <td><button onclick="updateOrderStatus('${o._id}')">Cập nhật</button></td>
      </tr>`;
    });
    document.getElementById('ordersTable').innerHTML = html;
  }

  async function updateOrderStatus(orderId) {
    const newStatus = prompt('Nhập trạng thái mới (pending/completed/failed):', 'completed');
    if (newStatus) {
      await fetch(`/api/admin/orders/${orderId}/status`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
      });
      loadOrders();
    }
  }

  async function loadProducts() {
    const res = await fetch('/api/products');
    const products = await res.json();
    let html = '<tr><th>ID</th><th>Tên</th><th>Giá</th><th>Tài khoản</th><th>Xóa</th></tr>';
    products.forEach(p => {
      html += `<tr>
        <td>${p._id}</td>
        <td>${p.name}</td>
        <td>${p.price.toLocaleString()}đ</td>
        <td><code>${p.accountData}</code></td>
        <td><button onclick="deleteProduct('${p._id}')">🗑️ Xóa</button></td>
      </tr>`;
    });
    document.getElementById('productsTable').innerHTML = html;
  }

  async function addProduct() {
    const name = document.getElementById('prodName').value;
    const price = parseInt(document.getElementById('prodPrice').value);
    const accountData = document.getElementById('prodAccount').value;
    if (!name || !price || !accountData) return alert('Điền đầy đủ thông tin');
    await fetch('/api/admin/products', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, price, accountData })
    });
    alert('Đã thêm sản phẩm');
    loadProducts();
    document.getElementById('prodName').value = '';
    document.getElementById('prodPrice').value = '';
    document.getElementById('prodAccount').value = '';
  }

  async function deleteProduct(productId) {
    if (confirm('Xóa sản phẩm này?')) {
      await fetch(`/api/admin/products/${productId}`, { method: 'DELETE' });
      loadProducts();
    }
  }

  async function loadUsers() {
    const res = await fetch('/api/admin/users');
    const users = await res.json();
    let html = '<tr><th>ID</th><th>Username</th><th>Số dư</th><th>Cộng tiền</th></tr>';
    users.forEach(u => {
      html += `<tr>
        <td>${u._id}</td>
        <td>${u.username}</td>
        <td>${u.balance.toLocaleString()}đ</td>
        <td><input type="number" id="amount_${u._id}" placeholder="Số tiền" /> <button onclick="addBalance('${u._id}')">+</button></td>
      </tr>`;
    });
    document.getElementById('usersTable').innerHTML = html;
  }

  async function addBalance(userId) {
    const amount = parseInt(document.getElementById(`amount_${userId}`).value);
    if (!amount) return;
    await fetch(`/api/admin/users/${userId}/balance`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount })
    });
    alert('Đã cộng tiền');
    loadUsers();
  }

  // Tải dữ liệu ban đầu
  loadOrders();
  loadProducts();
  loadUsers();
  setInterval(loadOrders, 10000);
</script>
</body>
</html>
