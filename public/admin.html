<!-- ==================== public/admin.html ==================== -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <style>
    body { font-family: Arial; margin: 20px; background: #f0f0f0; }
    .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #333; color: white; }
    .section { margin-bottom: 40px; }
    button { padding: 5px 10px; cursor: pointer; }
    input { padding: 5px; margin: 5px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Admin Dashboard</h1>
  <div class="section"><h2>Đơn hàng</h2><button onclick="loadOrders()">Tải lại</button><table id="ordersTable"><thead><tr><th>Mã</th><th>User</th><th>Sản phẩm</th><th>Tiền</th><th>Loại</th><th>Status</th><th>Ngày</th></tr></thead><tbody></tbody></table></div>
  <div class="section"><h2>Sản phẩm</h2><input type="text" id="prodName" placeholder="Tên" /><input type="number" id="prodPrice" placeholder="Giá" /><input type="text" id="prodAccount" placeholder="user:pass" /><button onclick="addProduct()">Thêm</button><table id="productsTable"><thead><tr><th>Tên</th><th>Giá</th><th>Tài khoản</th><th>Xóa</th></tr></thead><tbody></tbody></table></div>
  <div class="section"><h2>Người dùng</h2><table id="usersTable"><thead><tr><th>Username</th><th>Số dư</th><th>Cộng tiền</th></tr></thead><tbody></tbody></table></div>
</div>
<script>
  const API_URL = '';
  async function loadOrders() {
    const res = await fetch(API_URL + '/api/admin/orders');
    const orders = await res.json();
    let html = '';
    orders.forEach(o => { html += `<tr><td>${o.orderCode}</td><td>${o.userId?.username || 'N/A'}</td><td>${o.productId?.name || (o.type === 'deposit' ? 'Nạp tiền' : 'N/A')}</td><td>${o.amount.toLocaleString()}đ</td><td>${o.type}</td><td>${o.status}</td><td>${new Date(o.createdAt).toLocaleString()}</td></tr>`; });
    document.querySelector('#ordersTable tbody').innerHTML = html;
  }
  async function loadProducts() {
    const res = await fetch(API_URL + '/api/products');
    const products = await res.json();
    let html = '';
    products.forEach(p => { html += `<tr><td>${p.name}</td><td>${p.price.toLocaleString()}đ</td><td><code>${p.accountData}</code></td><td><button onclick="deleteProduct('${p._id}')">Xóa</button></td></tr>`; });
    document.querySelector('#productsTable tbody').innerHTML = html;
  }
  async function addProduct() {
    const name = document.getElementById('prodName').value, price = parseInt(document.getElementById('prodPrice').value), accountData = document.getElementById('prodAccount').value;
    if (!name || !price || !accountData) return alert('Điền đủ');
    await fetch(API_URL + '/api/admin/products', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, price, accountData }) });
    loadProducts();
  }
  async function deleteProduct(id) { if (confirm('Xóa?')) { await fetch(API_URL + `/api/admin/products/${id}`, { method: 'DELETE' }); loadProducts(); } }
  async function loadUsers() {
    const res = await fetch(API_URL + '/api/admin/users');
    const users = await res.json();
    let html = '';
    users.forEach(u => { html += `<tr><td>${u.username}</td><td>${u.balance.toLocaleString()}đ</td><td><input type="number" id="amount_${u._id}" placeholder="Số tiền" /><button onclick="addBalance('${u._id}')">Cộng</button></td></tr>`; });
    document.querySelector('#usersTable tbody').innerHTML = html;
  }
  async function addBalance(id) { const amount = parseInt(document.getElementById(`amount_${id}`).value); if (!amount) return; await fetch(API_URL + `/api/admin/users/${id}/balance`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ amount }) }); loadUsers(); }
  loadOrders(); loadProducts(); loadUsers(); setInterval(loadOrders, 10000);
</script>
</body>
</html>
